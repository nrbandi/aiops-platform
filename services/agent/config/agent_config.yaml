# AIOps Platform — Agent Configuration
# Pre-production grade | aiops-platform repo

observe:
  poll_interval_seconds: 15
  window_size: 10
  warmup_windows: 288
  warmup_windows_demo: 10
  zscore_threshold: 3.0
  zscore_threshold_demo: 1.5

analyze:
  zscore_threshold: 3.0
  zscore_threshold_demo: 1.5
  isolation_forest:
    contamination: 0.05
    n_estimators: 100
    random_state: 42
  event_correlator:
    co_occurrence_window: 5

decide:
  playbook_file: "services/agent/config/playbooks.yaml"
  environments:
    - production
    - staging
    - development
  business_hours:
    start: 8
    end: 20
  operator_roles:
    - L1
    - L2
    - L3

act:
  log_path: "data/logs/action_log.jsonl"
  demo_mode: true

# ── Observe layer adapter configuration ──────────────────────────
data:
  adapter: "synthetic" # Options: synthetic | gaia
  gaia_path: "data/gaia"
  replay_speed: 1.0 # 1.0=real-time 10.0=fast evaluation
  start_offset: 4880 # Start near GAIA anomaly region (row 4889)
