# AIOps Platform — Agent Configuration
# Pre-production grade | aiops-platform repo

observe:
  poll_interval_seconds: 15
  window_size: 10
  warmup_windows: 288
  warmup_windows_demo: 30
  zscore_threshold: 3.0
  zscore_threshold_demo: 1.5

analyze:
  zscore_threshold: 3.0
  zscore_threshold_demo: 1.5
  isolation_forest:
    contamination: 0.055
    n_estimators: 100
    random_state: 42
  event_correlator:
    co_occurrence_window: 5
  flatness:
    cv_threshold: 0.005
    min_signal: 1.0
    min_flat_ratio: 0.7
    band_pct: 0.01

decide:
  playbook_file: "services/agent/config/playbooks.yaml"
  z_threshold: 1.5
  environments:
    - production
    - staging
    - development
  business_hours:
    start: 8
    end: 20
  operator_roles:
    - L1
    - L2
    - L3

act:
  log_path: "data/logs/action_log.jsonl"
  demo_mode: true
  cooldown_windows:
    CRITICAL: 5
    HIGH: 10
    MEDIUM: 15
    LOW: 20

# ── Observe layer adapter configuration ──────────────────────────
data:
  adapter: "gaia" # Options: synthetic | gaia
  gaia_path: "data/gaia"
  replay_speed: 1.0 # 1.0=real-time 10.0=fast evaluation
  start_offset: 4880 # Start near GAIA anomaly region (row 4889)
